name: compile
description: Compile myst binary and upload workflow artifact
inputs:
  build_env:
    description: Environment name passed to build.sh
    required: true
  mysql_host:
    description: MySQL host for build.sh
    required: false
    default: localhost
  mysql_user:
    description: MySQL user for build.sh
    required: false
    default: nebbie
  mysql_db:
    description: MySQL database name for build.sh
    required: false
    default: nebbie
  mysql_password:
    description: MySQL password for build.sh
    required: false
    default: secret
  mysql_port:
    description: MySQL port for build.sh
    required: false
    default: 3306
  excludes:
    description: Excludes
    required: true
    default: latest,prerelease, release
  dryrun:
    description: Dry run
    required: false
    default: true
  token:
    description: GitHub token
    required: false
    default: "none"
  pr_id:
    description: Pull request ID
    required: false
    default: ''
  pr_title:
    description: Pull request title
    required: false
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - name: Find milestone
      id: ms
      if: inputs.pr_id != '' 
      uses: actions/github-script@main
      with:
        script: |
          const { data } = await github.request("GET /repos/{owner}/{repo}/pulls/{pr}", {
            owner: context.repo.owner,
            repo: context.repo.repo,
            pr: ${{ inputs.pr_id }}
          });
          if (data.milestone) {
            core.info(`This pull request has a milestone set: ${data.milestone.title}`);
            core.setOutput("milestone", data.milestone.title);
          } else {
            core.info(`A maintainer needs to set the milestone for this pull request.`);
          }          

    - name: Info
      shell: bash
      run: |
        echo "Base ref: ${{ github.ref }}"
        echo "Build env: ${{ inputs.build_env }}"
        echo "Dry run: ${{ inputs.dryrun }}"
        echo "Excludes: ${{ inputs.excludes }}"
        echo "Token: ${{ inputs.token }}"
        echo "MySQL host: ${{ inputs.mysql_host }}"
        echo "MySQL user: ${{ inputs.mysql_user }}"
        echo "MySQL password: ${{ inputs.mysql_password }}"
        echo "MySQL port: ${{ inputs.mysql_port }}"
        echo "MySQL db: ${{ inputs.mysql_db }}"

    - name: Compile myst
      if: ${{ inputs.dryrun != true }}
      shell: bash
      env:
        MYSQL_HOST: ${{ inputs.mysql_host }}
        MYSQL_USER: ${{ inputs.mysql_user }}
        MYSQL_PASSWORD: ${{ inputs.MYSQL_PASSWORD }}
        MYSQL_PORT: ${{ inputs.mysql_port }}
        MYSQL_DB: ${{ inputs.mysql_db }}
      run: |
        git config --global --add safe.directory /__w/Server/Server
        case "${{ github.ref_name }}" in
          r[0-9]*) export TAG="${{ github.ref_name }}"; TAG="${TAG#}" ;;
          release/*) export TAG="${{ github.ref_name }}"; TAG="${TAG#release/}-beta" ;;
          *) export TAG="" ;;
        esac
        if [ "${{ github.event_name }}" = 'tag' ]; then
          export TAG="${{ github.ref_name }}"
        fi
        echo "TAG: $TAG"
        ./build.sh "${{ inputs.build_env }}"
        chmod +x "./mudroot/myst"
        mkdir -p ./assets
        cp mudroot/myst "./assets/myst"
        ./mudroot/myst -V > "./assets/version.txt" 2>&1 || true
        ./mudroot/myst -c >> "./assets/config.txt" 2>&1 || true

    - name: Fake compile release binary
      shell: bash
      if: ${{ inputs.dryrun == true }}
      env:
        BUILD_ENV: ${{ inputs.build_env }}
      run: |
        RELEASE_NAME="myst-${BUILD_ENV}"
        echo "Pseudo executable" > "./mudroot/myst"
        mkdir -p ./assets
        cp mudroot/myst "./assets/myst"

        echo "Version dryrun" > "./assets/config.txt" 2>&1 || true
        echo "" >> "./assets/config.txt" 2>&1 || true
        echo "Version: ${{ github.ref_name }}" >> "./assets/version.txt" 2>&1 || true
        echo "Config dryrun" >> "./assets/config.txt" 2>&1 || true
        ls -la ./assets
    - name: Upload artifact
      uses: actions/upload-artifact@main
      with:
        name: assets
        path: ./assets/*
        overwrite: true
        if-no-files-found: error
        retention-days: 1

