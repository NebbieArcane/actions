name: Dockerize common

on:
  workflow_call:
    inputs:
      dryrun:
        type: boolean
        description: Dry run
        required: false
        default: false
      build_env:
        type: string
        description: The environment to build
        required: true
        default: devel

jobs:
  execute:
    environment:
      name: ${{ inputs.build_env }}
      deployment: false
    runs-on: ubuntu-latest
    steps:
      - name: Info
        shell: bash
        run: |
          echo "Base ref: ${{ github.ref }}"
          echo "Build environment: ${{ inputs.build_env }}"
          echo "MYSQL_HOST: ${{ vars.MYSQL_HOST }}"
          echo "MYSQL_USER: ${{ vars.MYSQL_USER }}"
          echo "MYSQL_DB: ${{ vars.MYSQL_DB }}"
          echo "MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}"
          echo "MYSQL_PORT: ${{ vars.MYSQL_PORT }}"
          echo "MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}"

      - uses: NebbieArcane/Actions/dockerize@main
        with:
          build_env: ${{ inputs.build_env }}
          token: ${{ secrets.GITHUB_TOKEN }}
            
