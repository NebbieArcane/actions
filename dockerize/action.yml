name: dockerize
description: Builds a container with myst binary and upload workflow artifact
inputs:
  build_env:
    description: Environment name passed to build.sh
    required: true
  token:
    description: GitHub token
    required: false
    default: "none"
runs:
  using: composite
  steps:
      # - name: Checkout
      #   uses: actions/checkout@v6  
      - name: Download artifact
        uses: actions/download-artifact@main
        with:
          name: assets
          path: ./
      - name: Info
        shell: bash
        run: |
          echo "Artifact downloaded"
          ls -la        
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/myst_${{ inputs.build_env }}
          tags: |
            ${{ inputs.build_env }}
            type=semver,pattern={{version}}
            latest
            type=ref,event=branch
            # tag event
            type=ref,event=tag
            # pull request event
            type=ref,event=pr            

      - name: Calculated tags
        shell: bash
        run: |
          echo "Calculated tags: ${{ steps.meta.outputs.tags }}"
      - name: Generate Dockerfile
        shell: bash
        run: |
          echo "Generating Dockerfile"
          echo "FROM nebbiearcane/mudcompiler:latest" > Dockerfile
          echo "ENV DEBIAN_FRONTEND=noninteractive" >> Dockerfile
          echo "ENV DOCKER_BUILD=ON" >> Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN ldconfig" >> Dockerfile
          echo "WORKDIR /run" >> Dockerfile
          echo "COPY myst /run/myst_${{ inputs.build_env }}" >> Dockerfile
          echo "COPY version.txt /run" >> Dockerfile
          echo "COPY config.txt /run" >> Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN chmod +x /run/myst*" >> Dockerfile
          echo 'WORKDIR ["/run"]' >> Dockerfile
          echo 'LABEL org.opencontainers.image.title="Myst_${{ inputs.build_env }} server"' >> Dockerfile
          echo 'LABEL org.opencontainers.image.description="Nebbie Arcane ${{ inputs.build_env }} server"' >> Dockerfile
          echo 'ENTRYPOINT ["/run/myst_${{ inputs.build_env }}"]' >> Dockerfile
          echo "CMD ["-V"]" >> Dockerfile
          ls -al
          cat Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ inputs.token }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
