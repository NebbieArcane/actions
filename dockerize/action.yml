name: dockerize
description: Builds a container with myst binary and upload workflow artifact
inputs:
  build_env:
    description: Environment name passed to build.sh
    required: true
  token:
    description: GitHub token
    required: false
    default: "none"
runs:
  using: composite
  steps:
      # - name: Checkout
      #   uses: actions/checkout@v6  
      - name: Download artifact
        uses: actions/download-artifact@main
        with:
          name: assets
          path: ./
      - name: Info
        shell: bash
        run: |
          echo "Artifact downloaded"
          ls -la        
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: nebbiearcane/myst_${{ inputs.build_env }}
          tags: |
            ${{ inputs.build_env }}
            type=semver,pattern={{version}}
      - name: Calculated tags
        shell: bash
        run: |
          echo "Calculated tags: ${{ steps.meta.outputs.tags }}"
      - name: Generate Dockerfile
        shell: bash
        run: |
          echo "Generating Dockerfile"
          echo "FROM nebbiearcane/mudcompiler:latest" > Dockerfile
          echo "ENV DEBIAN_FRONTEND=noninteractive" >> Dockerfile
          echo "ENV DOCKER_BUILD=ON" >> Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN ldconfig" >> Dockerfile
          echo "WORKDIR /run" >> Dockerfile
          echo "COPY myst /run/myst_${{ inputs.build_env }}" >> Dockerfile
          echo "COPY version.txt /run" >> Dockerfile
          echo "COPY config.txt /run" >> Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN ldconfig" >> Dockerfile
          echo "WORKDIR /run" >> Dockerfile
          echo "ENTRYPOINT ["./myst_${{ inputs.build_env }}"]" >> Dockerfile
          echo "CMD ["-v"]" >> Dockerfile
          ls -al

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./
          push: true
          tags:  ${{ steps.meta.outputs.tags }}



