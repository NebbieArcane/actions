name: dockerize
description: Builds a container with myst binary and upload workflow artifact
inputs:
  artifact:
    description: Artifact name
    required: true
  image:
    description: Image name
    required: true
  tag:
    description: Tag name
    required: true
  token:
    description: GitHub token
    required: true
  excludes:
    description: Excludes
    required: true
    default: latest,prerelease
runs:
  using: composite
  steps:
      - name: Checkout
        uses: actions/checkout@v6  
      - name: Download artifact
        uses: actions/download-artifact@main
        with:
          name: ./assets
          path: ./assets/*
      - name: Info
        shell: bash
        run: |
          echo "Artifact downloaded"
          ls -la ./assets        
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            myst
          tags: |
            type=custom,pattern={{ inputs.tag }}
            type=semver,pattern={{version}}
      - name: Calculated tags
        shell: bash
        run: |
          echo "Calculated tags: ${{ steps.meta.outputs.tags }}"
      - name: Generate Dockerfile
        shell: bash
        run: |
          echo "Generating Dockerfile"
          cat <<EOF > Dockerfile
          echo "FROM nebbiearcane/mudcompiler:latest" > Dockerfile
          echo "ENV DEBIAN_FRONTEND=noninteractive" >> Dockerfile
          echo "ENV DOCKER_BUILD=ON" >> Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN ldconfig" >> Dockerfile
          echo "WORKDIR /run" >> Dockerfile
          echo "COPY myst .
          echo "COPY version.txt .
          echo "COPY config.txt .
          echo "ENTRYPOINT ["./myst"]" >> Dockerfile
          echo "USER root" >> Dockerfile
          echo "RUN ldconfig" >> Dockerfile
          echo "WORKDIR /run" >> Dockerfile
          echo "COPY myst .
          echo "COPY version.txt .
          echo "COPY config.txt .
          echo "ENTRYPOINT ["./myst"]" >> Dockerfile
          echo "CMD ["-v"]" >> Dockerfile
          ls -al
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./mudrunner
          push: false
          tags: ${{ steps.meta.outputs.tags }}



